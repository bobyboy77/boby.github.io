<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>התחברות • Training</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/style.css" />
</head>
<body>
  <div class="auth-wrapper">
    <div class="auth-card">
      <h1>Training</h1>
      <p class="subtitle">התחבר/י כדי לראות את האימונים השבועיים</p>

      <form id="loginForm">
        <div class="field">
          <label for="email">שם משתמש (אימייל)</label>
          <input type="email" id="email" autocomplete="username" required />
        </div>
        <div class="field">
          <label for="password">סיסמה</label>
          <input type="password" id="password" autocomplete="current-password" required />
        </div>
        <button type="submit" class="btn full" id="submitBtn">כניסה</button>
      </form>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="assets/supabase.js"></script>
  <script>
    (async () => {
      const { data: { session } } = await sb.auth.getSession();
      if (session) window.location.href = 'schedule.html';
    })();

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('submitBtn');
      btn.disabled = true;
      btn.textContent = 'מתחבר…';

      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      const { error } = await sb.auth.signInWithPassword({ email, password });

      if (error) {
        toast('שם משתמש או סיסמה שגויים', 'error');
        btn.disabled = false;
        btn.textContent = 'כניסה';
        return;
      }
      window.location.href = 'schedule.html';
    });
  </script>
</body>
</html>
